<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <div class="board-container">
        <div class="cell c1">1</div>
        <div class="cell c2">2</div>
        <div class="cell c3">3</div>
        <div class="cell c4">4</div>
        <div class="cell c5">5</div>
        <div class="cell c6">6</div>
        <div class="cell c7">7</div>
        <div class="cell c8">8</div>
        <div class="cell c9">9</div>
    </div>

    <div class="output-input">
        <p>Player 1</p>
        <button onclick="playAgain()">Play Again</button>
    </div>

    <div class="contact-container">
        <img src="./icons/instagram-icon.png" class="instagram-icon" alt="instagram icon">
        <img src="./icons/whatsapp-icon.png" class="whatsapp-icon" alt="whatsapp icon">
        <img src="./icons/github-icon.png" class="github-icon" alt="github icon">
    </div>
</body>
</html>
